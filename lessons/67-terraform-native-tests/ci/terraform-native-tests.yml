# Copy this template to .github/workflows/lesson67-terraform-native-tests.yml.
# In this repo, the active workflow already exists at that path.
name: lesson67-terraform-native-tests

on:
  pull_request:
    paths:
      - 'lessons/67-terraform-native-tests/**'
  push:
    branches:
      - main
    paths:
      - 'lessons/67-terraform-native-tests/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: lesson67-native-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_MODULE_DIR: lessons/67-terraform-native-tests/lab_67/terraform/modules/network
  TERRAFORM_VERSION: '1.14.4'
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  native-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -eo pipefail {0}
        working-directory: ${{ env.TF_MODULE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -diff -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false -input=false -no-color

      - name: Terraform native tests
        run: terraform test -test-directory=tests -no-color

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Lesson 67 Terraform Native Tests"
            echo
            echo "- module: ${TF_MODULE_DIR}"
            echo "- terraform version: ${TERRAFORM_VERSION}"
            echo "- provider: mocked by .tftest.hcl"
            echo "- AWS credentials: not required"
          } >> "$GITHUB_STEP_SUMMARY"
